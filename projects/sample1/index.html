<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio - Crafting Digital Experiences</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: '#1A1A1C',
            surface: '#242426',
            border: '#3A3A3C',
            gold: {
              DEFAULT: '#C9A962',
              deep: '#8B7845',
            },
            sage: '#6E9E6E',
            cream: '#F5F5F0',
            muted: '#6E6E70',
            dim: '#4A4A4C',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'serif'],
            body: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            pill: '20px',
          },
        },
      },
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #1A1A1C; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
