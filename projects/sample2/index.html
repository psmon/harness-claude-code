<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board - Simple Bulletin Board</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page: '#FFFFFF',
            card: '#F4F4F5',
            dark: '#000000',
            muted: '#27272A',
            'text-primary': '#000000',
            'text-secondary': '#71717A',
            'text-tertiary': '#A1A1AA',
            'text-disabled': '#D4D4D8',
            'border-subtle': '#F4F4F5',
            'border-strong': '#E4E4E7',
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            card: '16px',
            search: '24px',
            pill: '32px',
          },
        },
      },
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #FFFFFF; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
