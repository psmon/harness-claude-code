<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board - Simple Bulletin Board</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page: '#0A0A0B',
            surface: '#141417',
            elevated: '#1A1A1D',
            recessed: '#111113',
            'border-dark': '#1F1F23',
            'border-el': '#2A2A2E',
            accent: '#FF5C00',
            'accent-light': '#FF8A4C',
            'accent-tint': 'rgba(255,92,0,0.1)',
            'accent-tint-20': 'rgba(255,92,0,0.2)',
            success: '#22C55E',
            error: '#EF4444',
            'text-primary': '#FFFFFF',
            'text-secondary': '#ADADB0',
            'text-tertiary': '#8B8B90',
            'text-muted': '#6B6B70',
            'text-disabled': '#4A4A4E',
          },
          fontFamily: {
            serif: ['"Instrument Serif"', 'serif'],
            body: ['Inter', 'sans-serif'],
            mono: ['"DM Mono"', 'monospace'],
          },
          borderRadius: {
            card: '12px',
            btn: '8px',
            pill: '100px',
          },
        },
      },
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #0A0A0B; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
